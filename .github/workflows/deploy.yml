name: Deploy to GitHub Pages + Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install worker dependencies
        run: npm install
        working-directory: ecadrn-grant-studio/worker

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ecadrn-grant-studio/worker
          secrets: |
            GEMINI_API_KEY
            FIREBASE_PROJECT_ID
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

  deploy-firestore-rules:
    name: Deploy Firestore Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate to Google Cloud (WIF)
        id: wif-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/457031665165/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-deployer@gen-lang-client-0456143672.iam.gserviceaccount.com'
          create_credentials_file: true
          export_environment_variables: true

      - name: Deploy Firestore Rules
        run: |
          firebase deploy --only firestore:rules --project gen-lang-client-0456143672 --non-interactive
        working-directory: ecadrn-grant-studio

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: deploy-worker
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ecadrn-grant-studio/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: ecadrn-grant-studio

      - name: Build frontend
        run: npm run build
        working-directory: ecadrn-grant-studio
        env:
          VITE_BASE_PATH: '/ecadrn-grant-studio/'
          VITE_API_BASE_URL: 'https://ecadrn-grant-studio-ai.bradley-8b2.workers.dev'

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ecadrn-grant-studio/dist

      - uses: actions/deploy-pages@v4
        id: deployment
